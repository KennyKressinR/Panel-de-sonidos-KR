<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panel de Sonidos</title>
<style>
  /* ===== Reset mínimo, sin librerías, pensado para hardware muy limitado ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #121212;
    --panel: #1a1a1a;
    --panel-raised: #202020;
    --line: #2c2c2c;
    --text: #e8e4dc;
    --text-dim: #8a8a86;
    --accent: #e8a33d;
    --accent-dim: #7a5a26;
    --danger: #c1553f;
    --ok: #5c8a5c;
    --radius: 10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    /* system-ui: cero descargas de fuentes, clave para gama baja */
  }

  body {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  button {
    font-family: inherit;
    color: inherit;
    border: none;
    background: none;
    cursor: pointer;
  }

  /* ===== Barra superior ===== */
  #topbar {
    flex-shrink: 0;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #topbar-row1 {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #app-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }

  #search {
    flex: 1;
    min-width: 0;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    padding: 7px 10px;
    font-size: 14px;
  }
  #search::placeholder { color: var(--text-dim); }

  .btn-add {
    flex-shrink: 0;
    background: var(--accent);
    color: #1a1200;
    font-weight: 700;
    font-size: 20px;
    line-height: 1;
    width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-add:active { background: #c78a2e; }

  /* Fila de controles: categorías + orden */
  #topbar-row2 {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  #topbar-row2::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 12.5px;
    padding: 5px 11px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .chip.active {
    background: var(--accent-dim);
    color: var(--accent);
    border-color: var(--accent-dim);
    font-weight: 600;
  }
  .chip.chip-manage {
    color: var(--text-dim);
    font-size: 15px;
    padding: 5px 9px;
  }

  #sort-select {
    flex-shrink: 0;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 12px;
    padding: 5px 8px;
    border-radius: 999px;
    margin-left: auto;
  }

  /* ===== Grid principal de botones ===== */
  #board-wrap {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
    gap: 6px;
  }

  .sound-btn {
    position: relative;
    aspect-ratio: 1 / 1;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px 5px;
    overflow: hidden;
  }

  /* Estado "playing": cambio instantáneo de color, sin transiciones costosas */
  .sound-btn.playing {
    background: var(--accent-dim);
    border-color: var(--accent);
  }

  .sound-btn .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    position: absolute;
    top: 6px;
    right: 6px;
    display: none;
  }
  .sound-btn.playing .dot { display: block; }

  .sound-btn .label {
    font-size: 12px;
    line-height: 1.15;
    font-weight: 600;
    text-align: center;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
    hyphens: auto;
    max-height: 3.5em;
  }

  .sound-btn .cat-tag {
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .sound-btn:active { background: var(--panel-raised); }
  .sound-btn.playing:active { background: var(--accent-dim); }

  .sound-btn .del-x {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 20px;
    height: 20px;
    background: var(--danger);
    color: #fff;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  #board.edit-mode .del-x { display: flex; }
  #board.edit-mode .sound-btn { animation: none; } /* nunca animar en modo edición: gama baja */

  .empty-msg {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    padding: 40px 20px;
    line-height: 1.5;
  }

  /* ===== Modal (crear/editar sonido) ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 10;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--panel);
    border-top: 1px solid var(--line);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 480px;
    max-height: 88vh;
    overflow-y: auto;
    padding: 16px 16px 20px;
  }

  .modal h2 {
    font-size: 16px;
    margin-bottom: 14px;
    color: var(--accent);
  }

  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .field input[type="text"],
  .field select {
    width: 100%;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 9px 10px;
    border-radius: 8px;
    font-size: 14px;
  }
  .char-count {
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    margin-top: 2px;
  }

  .file-drop {
    border: 1.5px dashed var(--line);
    border-radius: 8px;
    padding: 14px 10px;
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
  }
  .file-drop.has-file {
    border-color: var(--ok);
    color: var(--ok);
  }
  .field input[type="file"] { display: none; }

  .new-cat-row {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }
  .new-cat-row input {
    flex: 1;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 7px 9px;
    border-radius: 8px;
    font-size: 13px;
  }
  .new-cat-row button {
    background: var(--panel-raised);
    border: 1px solid var(--line);
    color: var(--accent);
    padding: 0 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .modal-actions button {
    flex: 1;
    padding: 11px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
  }
  .btn-cancel {
    background: var(--panel-raised);
    color: var(--text-dim);
    border: 1px solid var(--line);
  }
  .btn-save {
    background: var(--accent);
    color: #1a1200;
  }
  .btn-save:disabled {
    background: var(--line);
    color: var(--text-dim);
  }
  .btn-delete-full {
    background: var(--danger);
    color: #fff;
  }

  .manage-cat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
  }
  .manage-cat-item span { flex: 1; }
  .manage-cat-item button {
    color: var(--danger);
    font-size: 12px;
    padding: 4px 8px;
  }

  .toast {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel-raised);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 9px 16px;
    border-radius: 999px;
    font-size: 13px;
    z-index: 20;
    display: none;
  }
  .toast.show { display: block; }

  /* Pantallas muy angostas: aún más compacto */
  @media (max-width: 340px) {
    #board { grid-template-columns: repeat(auto-fill, minmax(68px, 1fr)); }
    .sound-btn .label { font-size: 11px; }
  }
</style>
</head>
<body>

  <div id="topbar">
    <div id="topbar-row1">
      <span id="app-title">🔊 Panel</span>
      <input type="text" id="search" placeholder="Buscar sonido…">
      <button class="btn-add" id="open-add-modal" aria-label="Añadir sonido">+</button>
    </div>
    <div id="topbar-row2">
      <button class="chip active" data-cat="__all__">Todos</button>
      <button class="chip chip-manage" id="manage-cats-btn" title="Gestionar categorías">⚙</button>
      <select id="sort-select">
        <option value="recent">Recientes primero</option>
        <option value="old">Antiguos primero</option>
        <option value="az">Nombre A–Z</option>
        <option value="za">Nombre Z–A</option>
      </select>
    </div>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <!-- Modal: crear / editar sonido -->
  <div class="modal-overlay" id="sound-modal-overlay">
    <div class="modal">
      <h2 id="sound-modal-title">Nuevo sonido</h2>

      <div class="field">
        <label for="sound-name">Nombre del botón</label>
        <input type="text" id="sound-name" maxlength="60" placeholder="Ej: Ay Dios mío qué fue eso">
        <div class="char-count"><span id="name-char-count">0</span>/60</div>
      </div>

      <div class="field">
        <label for="sound-cat">Categoría</label>
        <select id="sound-cat"></select>
        <div class="new-cat-row">
          <input type="text" id="new-cat-input" maxlength="24" placeholder="Nueva categoría…">
          <button id="new-cat-add-btn" type="button">Añadir</button>
        </div>
      </div>

      <div class="field">
        <label>Archivo de audio</label>
        <label class="file-drop" id="file-drop-label" for="sound-file">Toca para elegir un audio</label>
        <input type="file" id="sound-file" accept="audio/*">
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-sound-modal">Cancelar</button>
        <button class="btn-save" id="save-sound-btn" disabled>Guardar</button>
      </div>
      <div class="modal-actions" id="delete-row" style="display:none;">
        <button class="btn-delete-full" id="delete-sound-btn">Borrar este sonido</button>
      </div>
    </div>
  </div>

  <!-- Modal: gestionar categorías -->
  <div class="modal-overlay" id="cats-modal-overlay">
    <div class="modal">
      <h2>Categorías</h2>
      <div id="cats-list"></div>
      <div class="new-cat-row" style="margin-top:12px;">
        <input type="text" id="cats-modal-new-input" maxlength="24" placeholder="Nueva categoría…">
        <button id="cats-modal-new-btn" type="button">Añadir</button>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="close-cats-modal">Cerrar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  /* =========================================================
     CAPA DE DATOS — IndexedDB
     Los blobs de audio no caben bien en localStorage (límite ~5MB
     y todo en string), así que usamos IndexedDB, que maneja
     Blobs de forma nativa y eficiente incluso en gama baja.
     ========================================================= */
  const DB_NAME = "soundboard-db";
  const DB_VERSION = 1;
  const STORE_SOUNDS = "sounds";
  const STORE_CATS = "categories";
  let db = null;

  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const _db = e.target.result;
        if (!_db.objectStoreNames.contains(STORE_SOUNDS)) {
          _db.createObjectStore(STORE_SOUNDS, { keyPath: "id" });
        }
        if (!_db.objectStoreNames.contains(STORE_CATS)) {
          _db.createObjectStore(STORE_CATS, { keyPath: "id" });
        }
      };
      req.onsuccess = (e) => resolve(e.target.result);
      req.onerror = (e) => reject(e.target.error);
    });
  }

  function tx(storeName, mode) {
    return db.transaction(storeName, mode).objectStore(storeName);
  }

  function idbGetAll(storeName) {
    return new Promise((resolve, reject) => {
      const req = tx(storeName, "readonly").getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  }

  function idbPut(storeName, obj) {
    return new Promise((resolve, reject) => {
      const req = tx(storeName, "readwrite").put(obj);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  function idbDelete(storeName, id) {
    return new Promise((resolve, reject) => {
      const req = tx(storeName, "readwrite").delete(id);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  /* =========================================================
     ESTADO EN MEMORIA
     ========================================================= */
  let sounds = [];       // { id, name, catId, audioBlob, createdAt }
  let categories = [];   // { id, name }
  let activeCatId = "__all__";
  let sortMode = "recent";
  let searchTerm = "";
  let editMode = false;
  let editingSoundId = null; // si no es null, el modal de sonido está editando en vez de creando
  let pickedFile = null;

  // Guardamos URLs de objeto creadas para no filtrar memoria (clave en gama baja)
  const objectUrlCache = new Map(); // soundId -> url
  let currentAudio = null;
  let currentPlayingBtn = null;

  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

  /* =========================================================
     REFERENCIAS DOM
     ========================================================= */
  const boardEl = document.getElementById("board");
  const topbarRow2 = document.getElementById("topbar-row2");
  const sortSelect = document.getElementById("sort-select");
  const searchInput = document.getElementById("search");
  const toastEl = document.getElementById("toast");

  const soundModalOverlay = document.getElementById("sound-modal-overlay");
  const soundModalTitle = document.getElementById("sound-modal-title");
  const nameInput = document.getElementById("sound-name");
  const nameCharCount = document.getElementById("name-char-count");
  const catSelect = document.getElementById("sound-cat");
  const newCatInput = document.getElementById("new-cat-input");
  const newCatAddBtn = document.getElementById("new-cat-add-btn");
  const fileInput = document.getElementById("sound-file");
  const fileDropLabel = document.getElementById("file-drop-label");
  const saveSoundBtn = document.getElementById("save-sound-btn");
  const deleteRow = document.getElementById("delete-row");
  const deleteSoundBtn = document.getElementById("delete-sound-btn");

  const catsModalOverlay = document.getElementById("cats-modal-overlay");
  const catsListEl = document.getElementById("cats-list");
  const catsModalNewInput = document.getElementById("cats-modal-new-input");

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toastEl.classList.remove("show"), 1800);
  }

  /* =========================================================
     RENDER: CATEGORÍAS (chips en la barra superior)
     ========================================================= */
  function renderCategoryChips() {
    // Eliminar chips existentes salvo "Todos" y el botón de gestionar
    Array.from(topbarRow2.querySelectorAll(".chip[data-cat]")).forEach((el) => {
      if (el.dataset.cat !== "__all__") el.remove();
    });

    const manageBtn = document.getElementById("manage-cats-btn");
    categories.forEach((cat) => {
      const chip = document.createElement("button");
      chip.className = "chip" + (activeCatId === cat.id ? " active" : "");
      chip.textContent = cat.name;
      chip.dataset.cat = cat.id;
      chip.addEventListener("click", () => {
        activeCatId = cat.id;
        renderCategoryChips();
        renderBoard();
      });
      topbarRow2.insertBefore(chip, manageBtn);
    });

    // Refrescar estado activo del chip "Todos"
    const allChip = topbarRow2.querySelector('[data-cat="__all__"]');
    allChip.classList.toggle("active", activeCatId === "__all__");
  }

  /* =========================================================
     RENDER: TABLERO DE BOTONES
     ========================================================= */
  function getFilteredSortedSounds() {
    let list = sounds.slice();

    if (activeCatId !== "__all__") {
      list = list.filter((s) => s.catId === activeCatId);
    }
    if (searchTerm.trim()) {
      const q = searchTerm.trim().toLowerCase();
      list = list.filter((s) => s.name.toLowerCase().includes(q));
    }

    switch (sortMode) {
      case "recent":
        list.sort((a, b) => b.createdAt - a.createdAt);
        break;
      case "old":
        list.sort((a, b) => a.createdAt - b.createdAt);
        break;
      case "az":
        list.sort((a, b) => a.name.localeCompare(b.name, "es"));
        break;
      case "za":
        list.sort((a, b) => b.name.localeCompare(a.name, "es"));
        break;
    }
    return list;
  }

  function categoryName(catId) {
    const c = categories.find((c) => c.id === catId);
    return c ? c.name : "";
  }

  function renderBoard() {
    const list = getFilteredSortedSounds();
    boardEl.classList.toggle("edit-mode", editMode);
    boardEl.innerHTML = "";

    if (list.length === 0) {
      const msg = document.createElement("div");
      msg.className = "empty-msg";
      msg.textContent = sounds.length === 0
        ? "Aún no hay botones. Toca “+” para crear el primero."
        : "No hay sonidos que coincidan con este filtro.";
      boardEl.appendChild(msg);
      return;
    }

    const frag = document.createDocumentFragment();
    list.forEach((s) => {
      const btn = document.createElement("button");
      btn.className = "sound-btn";
      btn.dataset.id = s.id;

      const dot = document.createElement("div");
      dot.className = "dot";
      btn.appendChild(dot);

      const delX = document.createElement("div");
      delX.className = "del-x";
      delX.textContent = "✕";
      delX.addEventListener("click", (e) => {
        e.stopPropagation();
        confirmQuickDelete(s.id);
      });
      btn.appendChild(delX);

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = s.name;
      btn.appendChild(label);

      if (s.catId) {
        const tag = document.createElement("div");
        tag.className = "cat-tag";
        tag.textContent = categoryName(s.catId);
        btn.appendChild(tag);
      }

      btn.addEventListener("click", () => {
        if (editMode) {
          openSoundModalForEdit(s.id);
        } else {
          playSound(s.id, btn);
        }
      });

      // Mantener presionado activa el modo edición (útil en pantallas táctiles baratas)
      let pressTimer = null;
      btn.addEventListener("touchstart", () => {
        pressTimer = setTimeout(() => {
          editMode = true;
          renderBoard();
        }, 550);
      }, { passive: true });
      btn.addEventListener("touchend", () => clearTimeout(pressTimer));
      btn.addEventListener("touchmove", () => clearTimeout(pressTimer));

      frag.appendChild(btn);
    });
    boardEl.appendChild(frag);
  }

  function confirmQuickDelete(soundId) {
    const s = sounds.find((x) => x.id === soundId);
    if (!s) return;
    if (confirm(`¿Borrar "${s.name}"?`)) {
      deleteSound(soundId);
    }
  }

  /* =========================================================
     REPRODUCCIÓN DE AUDIO
     ========================================================= */
  function getObjectUrl(sound) {
    if (objectUrlCache.has(sound.id)) return objectUrlCache.get(sound.id);
    const url = URL.createObjectURL(sound.audioBlob);
    objectUrlCache.set(sound.id, url);
    return url;
  }

  function playSound(soundId, btnEl) {
    const s = sounds.find((x) => x.id === soundId);
    if (!s || !s.audioBlob) {
      showToast("Este botón no tiene audio");
      return;
    }

    // Si tocan el mismo botón que está sonando, lo detiene (toggle)
    if (currentPlayingBtn === btnEl && currentAudio && !currentAudio.paused) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      btnEl.classList.remove("playing");
      currentAudio = null;
      currentPlayingBtn = null;
      return;
    }

    // Detener sonido anterior si había uno
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      if (currentPlayingBtn) currentPlayingBtn.classList.remove("playing");
    }

    const url = getObjectUrl(s);
    const audio = new Audio(url);
    currentAudio = audio;
    currentPlayingBtn = btnEl;
    btnEl.classList.add("playing");

    audio.addEventListener("ended", () => {
      btnEl.classList.remove("playing");
      if (currentAudio === audio) {
        currentAudio = null;
        currentPlayingBtn = null;
      }
    });
    audio.play().catch(() => {
      btnEl.classList.remove("playing");
      showToast("No se pudo reproducir el audio");
    });
  }

  /* =========================================================
     MODAL: CREAR / EDITAR SONIDO
     ========================================================= */
  function populateCatSelect() {
    catSelect.innerHTML = "";
    const optNone = document.createElement("option");
    optNone.value = "";
    optNone.textContent = "Sin categoría";
    catSelect.appendChild(optNone);

    categories.forEach((cat) => {
      const opt = document.createElement("option");
      opt.value = cat.id;
      opt.textContent = cat.name;
      catSelect.appendChild(opt);
    });
  }

  function resetSoundModalFields() {
    nameInput.value = "";
    nameCharCount.textContent = "0";
    populateCatSelect();
    catSelect.value = "";
    newCatInput.value = "";
    pickedFile = null;
    fileInput.value = "";
    fileDropLabel.textContent = "Toca para elegir un audio";
    fileDropLabel.classList.remove("has-file");
    updateSaveButtonState();
  }

  function openSoundModalForCreate() {
    editingSoundId = null;
    soundModalTitle.textContent = "Nuevo sonido";
    deleteRow.style.display = "none";
    resetSoundModalFields();
    soundModalOverlay.classList.add("open");
    nameInput.focus();
  }

  function openSoundModalForEdit(soundId) {
    const s = sounds.find((x) => x.id === soundId);
    if (!s) return;
    editingSoundId = soundId;
    soundModalTitle.textContent = "Editar sonido";
    deleteRow.style.display = "flex";
    populateCatSelect();

    nameInput.value = s.name;
    nameCharCount.textContent = String(s.name.length);
    catSelect.value = s.catId || "";
    newCatInput.value = "";
    pickedFile = null; // si el usuario no toca el archivo, se conserva el original
    fileInput.value = "";
    if (s.audioBlob) {
      fileDropLabel.textContent = "🎵 Audio ya cargado (toca para cambiarlo)";
      fileDropLabel.classList.add("has-file");
    } else {
      fileDropLabel.textContent = "Toca para elegir un audio";
      fileDropLabel.classList.remove("has-file");
    }
    updateSaveButtonState();
    soundModalOverlay.classList.add("open");
  }

  function closeSoundModal() {
    soundModalOverlay.classList.remove("open");
    editingSoundId = null;
    pickedFile = null;
  }

  function updateSaveButtonState() {
    const hasName = nameInput.value.trim().length > 0;
    const hasAudio = pickedFile !== null || (editingSoundId !== null && sounds.find(s => s.id === editingSoundId)?.audioBlob);
    saveSoundBtn.disabled = !(hasName && hasAudio);
  }

  nameInput.addEventListener("input", () => {
    nameCharCount.textContent = String(nameInput.value.length);
    updateSaveButtonState();
  });

  fileInput.addEventListener("change", () => {
    const f = fileInput.files && fileInput.files[0];
    if (f) {
      pickedFile = f;
      fileDropLabel.textContent = "🎵 " + f.name;
      fileDropLabel.classList.add("has-file");
    }
    updateSaveButtonState();
  });

  newCatAddBtn.addEventListener("click", async () => {
    const name = newCatInput.value.trim();
    if (!name) return;
    const cat = { id: uid(), name };
    categories.push(cat);
    await idbPut(STORE_CATS, cat);
    populateCatSelect();
    catSelect.value = cat.id;
    newCatInput.value = "";
    renderCategoryChips();
    showToast("Categoría añadida");
  });

  document.getElementById("open-add-modal").addEventListener("click", openSoundModalForCreate);
  document.getElementById("cancel-sound-modal").addEventListener("click", closeSoundModal);
  soundModalOverlay.addEventListener("click", (e) => {
    if (e.target === soundModalOverlay) closeSoundModal();
  });

  saveSoundBtn.addEventListener("click", async () => {
    const name = nameInput.value.trim();
    if (!name) return;
    const catId = catSelect.value || null;

    if (editingSoundId) {
      const s = sounds.find((x) => x.id === editingSoundId);
      if (!s) return;
      s.name = name;
      s.catId = catId;
      if (pickedFile) {
        s.audioBlob = pickedFile;
        // invalidar url cacheada vieja
        if (objectUrlCache.has(s.id)) {
          URL.revokeObjectURL(objectUrlCache.get(s.id));
          objectUrlCache.delete(s.id);
        }
      }
      await idbPut(STORE_SOUNDS, s);
      showToast("Sonido actualizado");
    } else {
      if (!pickedFile) return;
      const newSound = {
        id: uid(),
        name,
        catId,
        audioBlob: pickedFile,
        createdAt: Date.now(),
      };
      sounds.push(newSound);
      await idbPut(STORE_SOUNDS, newSound);
      showToast("Sonido creado");
    }

    closeSoundModal();
    renderBoard();
  });

  deleteSoundBtn.addEventListener("click", () => {
    if (!editingSoundId) return;
    const s = sounds.find((x) => x.id === editingSoundId);
    if (s && confirm(`¿Borrar "${s.name}"? Esta acción no se puede deshacer.`)) {
      deleteSound(editingSoundId);
      closeSoundModal();
    }
  });

  async function deleteSound(soundId) {
    sounds = sounds.filter((s) => s.id !== soundId);
    await idbDelete(STORE_SOUNDS, soundId);
    if (objectUrlCache.has(soundId)) {
      URL.revokeObjectURL(objectUrlCache.get(soundId));
      objectUrlCache.delete(soundId);
    }
    renderBoard();
    showToast("Sonido borrado");
  }

  /* =========================================================
     MODAL: GESTIONAR CATEGORÍAS
     ========================================================= */
  function renderCatsModalList() {
    catsListEl.innerHTML = "";
    if (categories.length === 0) {
      const p = document.createElement("div");
      p.style.cssText = "color:var(--text-dim); font-size:13px; padding:10px 0;";
      p.textContent = "No hay categorías todavía.";
      catsListEl.appendChild(p);
      return;
    }
    categories.forEach((cat) => {
      const row = document.createElement("div");
      row.className = "manage-cat-item";
      const span = document.createElement("span");
      span.textContent = cat.name;
      const delBtn = document.createElement("button");
      delBtn.textContent = "Borrar";
      delBtn.addEventListener("click", async () => {
        const inUse = sounds.filter((s) => s.catId === cat.id).length;
        const msg = inUse > 0
          ? `"${cat.name}" tiene ${inUse} sonido(s). Se quedarán sin categoría. ¿Continuar?`
          : `¿Borrar la categoría "${cat.name}"?`;
        if (!confirm(msg)) return;

        categories = categories.filter((c) => c.id !== cat.id);
        await idbDelete(STORE_CATS, cat.id);

        // Los sonidos de esa categoría pasan a "sin categoría"
        for (const s of sounds) {
          if (s.catId === cat.id) {
            s.catId = null;
            await idbPut(STORE_SOUNDS, s);
          }
        }
        if (activeCatId === cat.id) activeCatId = "__all__";

        renderCatsModalList();
        renderCategoryChips();
        renderBoard();
      });
      row.appendChild(span);
      row.appendChild(delBtn);
      catsListEl.appendChild(row);
    });
  }

  document.getElementById("manage-cats-btn").addEventListener("click", () => {
    renderCatsModalList();
    catsModalOverlay.classList.add("open");
  });
  document.getElementById("close-cats-modal").addEventListener("click", () => {
    catsModalOverlay.classList.remove("open");
  });
  catsModalOverlay.addEventListener("click", (e) => {
    if (e.target === catsModalOverlay) catsModalOverlay.classList.remove("open");
  });
  document.getElementById("cats-modal-new-btn").addEventListener("click", async () => {
    const name = catsModalNewInput.value.trim();
    if (!name) return;
    const cat = { id: uid(), name };
    categories.push(cat);
    await idbPut(STORE_CATS, cat);
    catsModalNewInput.value = "";
    renderCatsModalList();
    renderCategoryChips();
  });

  /* =========================================================
     BARRA SUPERIOR: buscador, orden, salir de modo edición
     ========================================================= */
  searchInput.addEventListener("input", () => {
    searchTerm = searchInput.value;
    renderBoard();
  });

  sortSelect.addEventListener("change", () => {
    sortMode = sortSelect.value;
    renderBoard();
  });

  document.getElementById("app-title").addEventListener("click", () => {
    // Toque en el título: forma rápida de salir del modo edición si quedó activo
    if (editMode) {
      editMode = false;
      renderBoard();
    }
  });

  /* =========================================================
     INICIALIZACIÓN
     ========================================================= */
  async function init() {
    try {
      db = await openDB();
    } catch (err) {
      showToast("Error al abrir almacenamiento local");
      console.error(err);
      return;
    }

    const [storedSounds, storedCats] = await Promise.all([
      idbGetAll(STORE_SOUNDS),
      idbGetAll(STORE_CATS),
    ]);
    sounds = storedSounds;
    categories = storedCats;

    renderCategoryChips();
    renderBoard();
  }

  init();
})();
</script>
</body>
</html>
